<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nails by Jano</title>
  <meta name="description" content="Softgel extensions and gel polish in Tondo, Manila. By appointment only." />

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon/favicon-96x96.png" />
  <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="assets/favicon/site.webmanifest" />

  <!-- Cormorant Garamond -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="colors_and_type.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body { font-family: var(--font-sans); color: var(--fg); -webkit-font-smoothing: antialiased; }

    /* Cursor-following nail image */
    #nail-cursor {
      position: fixed;
      top: 0; left: 0;
      width: 260px;
      aspect-ratio: 3 / 4;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transform: translate(-50%, -60%) rotate(-4deg) scale(0.9);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
      background: #fff;
    }
    #nail-cursor img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: 0;
    }

    /* Service text hover */
    .service-text-item {
      cursor: default;
      transition: color 0.2s;
    }
    .service-text-item:hover { color: var(--brand-deep); }

    /* Scroll animation initial states */
    .anim-up   { opacity: 0; transform: translateY(48px); }
    .anim-left { opacity: 0; transform: translateX(-24px); }
    .nail-photo-wrap { opacity: 0; transform: translateY(32px); }

    /* ---- Mobile ---- */
    @media (max-width: 768px) {
      #nail-cursor { display: none !important; }
      body { overflow-x: hidden; }
      .tab-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }

    /* ---- Fluid images ---- */
    img { max-width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <!-- Cursor-following nail image -->
  <div id="nail-cursor">
    <img id="nail-cursor-img" src="" alt="" />
  </div>

  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Lenis smooth scroll -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- App -->
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script src="config.js"></script>
  <script type="text/babel" src="BookingPanel.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
